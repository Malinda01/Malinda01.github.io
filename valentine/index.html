<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Valentine?</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  <div class="blob one"></div>
  <div class="blob two"></div>

  <main class="wrap">
    <section class="card" id="card">
      <div class="shine"></div>

      <div class="top">
        <div class="badge"><span class="dot"></span> a tiny question</div>
        <div class="badge">❤️ Feb vibes</div>
      </div>

      <div class="question">
        <div class="titleBlock">
          <h1>Will you be my Valentine?</h1>
          <p>One click and I’ll officially upgrade my mood to “ridiculously happy”.</p>
          <div class="mini">Tip: press <span class="kbd">Y</span> for yes.</div>
        </div>

        <div class="actions" id="actions">
          <button class="yes" id="yesBtn">Yes</button>
          <button class="no" id="noBtn">No</button>
        </div>
      </div>

      <div class="footer">
        <span>Made with calm energy ✨</span>
        <span>Version 1.0</span>
      </div>
    </section>
  </main>

  <script src="./script.js"></script>
</body>
</html>
